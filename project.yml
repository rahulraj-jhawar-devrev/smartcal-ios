name: SmartCal
options:
  bundleIdPrefix: com.rahulraj
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    INFOPLIST_FILE: SmartCal/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.rahulraj.SmartCal
    DEVELOPMENT_TEAM: ""
packages:
  CalendarKit:
    url: https://github.com/richardtop/CalendarKit.git
    from: "1.0.0"
targets:
  SmartCal:
    type: application
    platform: iOS
    sources:
      - path: SmartCal
    dependencies:
      - package: CalendarKit
        product: CalendarKit
    settings:
      base:
        INFOPLIST_FILE: SmartCal/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.rahulraj.SmartCal
